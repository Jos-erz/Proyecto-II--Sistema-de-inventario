<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento de Equipos | Fundacite Yaracuy</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <span>Fundacite Yaracuy — Mantenimiento de Equipos Informáticos</span>
        <img src="Logofundacite.webp" alt="logo" class="logo">
    </header>

    <main>


        <section class="clase-card">
            <div class="clase-titulo">
                <h3>Diagnostico</h3>
            </div>

            <table class="clase-tabla">
                <tr>
                    <td>
                        <label for="tipo_falla">Tipo de falla <span class="req">*</span></label>
                        <input type="text" id="tipo_falla" name="tipo_falla" placeholder="Hardware,Software, electrico"
                            maxlength="20">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="hallazgo">Hallazgo <span class="req">*</span></label>
                        <input type="text" id="hallazgo" name="hallazgo" placeholder="Observacion tecnica"
                            maxlength="50">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="respuesta">Respuesta <span class="req">*</span></label>
                        <textarea id="respuesta" name="respuesta" rows="3" placeholder="Acción tomada o solucion"
                            maxlength="255"></textarea>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="estatus_final">Estatus <span class="req">*</span></label>
                        <select name="estatus_final">
                            <option value="">Seleccionar...</option>
                            <option value="Pendiente">Pendiente</option>
                            <option value="En proceso">En proceso</option>
                            <option value="Completado">Completado</option>
                        </select>
                    </td>
                </tr>
            </table>
        </section>

        <div class="form-actions">
            <form method="get" action="Actividad.html">
                <input type="submit" name="ATRÁS" value="ATRÁS" class="btn btn-secondary">
            </form>
            <form method="get" action="../Desincorporacion/Desincorporacion.html">
                <input type="submit" name="DESINCORPACION" value="DESINCORPORACION" class="btn btn-primary">
            </form>
        </div>
        <br><br><br>
        <center>
            <form method="get" action="../../dashboard/index.html">
                <input type="submit" name="Salir" value="SALIR" class="btn btn-primary">
            </form>
        </center>


    </main>
    <footer>
        <p>&copy; 2026 Fundacite Yaracuy — Sistema de Inventario</p>
    </footer>

</body>

</html>
