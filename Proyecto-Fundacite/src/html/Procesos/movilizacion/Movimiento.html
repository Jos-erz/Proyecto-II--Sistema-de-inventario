<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movilización de Equipos | Fundacite Yaracuy</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <span>Fundacite Yaracuy — Movilización de Equipos Informáticos</span>
        <img src="Logofundacite.webp" alt="logo" class="logo">
    </header>

    <main>



        <section class="clase-card">
            <div class="clase-titulo">
                <h3>Documento</h3>
            </div>

            <table class="clase-tabla">
                <tr>
                    <td>
                        <label for="doc-fecha">Fecha de emisión <span class="req">*</span></label>
                        <input type="date" id="doc-fecha" name="doc-fecha">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="doc-numero">Número de Documento <span class="req">*</span></label>
                        <input type="text" id="doc-numero" name="doc-numero" placeholder="Correlativo de registro"
                            maxlength="15">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="doc-archivo">Motivo<span class="req">*</span></label>
                        <input type="text" id="doc-archivo" name="doc-archivo"
                            placeholder="Dirección de almacenamiento o nombre del archivo" maxlength="100">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="estatus_final">Estado fisico <span class="req">*</span></label>
                        <select name="estatus_final">
                            <option value="">Seleccionar...</option>
                            <option value="En proceso">Operativo</option>
                            <option value="Completado">Obsoleto</option>
                        </select>
                    </td>
                </tr>
                 <tr>
                    <td>
                        <label for="estatus_final">Estado fisico <span class="req">*</span></label>
                        <select name="estatus_final">
                            <option value="">Seleccionar equipo...</option>
                            <option value="En proceso"></option>
                            <option value="Completado"></option>
                        </select>
                    </td>
                </tr>
            </table>
        </section>

        <div class="form-actions">
            <form method="get" action="../../dashboard/index.html">
                <input type="submit" name="ATRÁS" value="ATRÁS" class="btn btn-secondary">
            </form>
            <form method="get" action="../../dashboard/index.html">
                <input type="submit" name="GUARDAR" value="GUARDAR" class="btn btn-primary">
            </form>
        </div>

        <br><br><br>
        <center>
            <form method="get" action="../../dashboard/index.html">
                <input type="submit" name="Salir" value="SALIR" class="btn btn-primary">
            </form>
        </center>
    </main>

    <footer>
        <p>&copy; 2026 Fundacite Yaracuy — Sistema de Inventario</p>
    </footer>
</body>

</html>
