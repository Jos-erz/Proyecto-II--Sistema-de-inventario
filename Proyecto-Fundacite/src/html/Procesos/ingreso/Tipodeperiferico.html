<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso de Equipos | Fundacite Yaracuy</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <span>Fundacite Yaracuy — Ingreso de Equipos Informáticos</span>
        <img src="Logofundacite.webp" alt="logo" class="logo">
    </header>

    <main>


        <section class="clase-card">
            <div class="clase-titulo">
                <h3>Tipo de Periférico</h3>
            </div>

            <table class="clase-tabla">
                <tr>
                    <td>
                        <label for="tper-codigo">Código <span class="req">*</span></label>
                        <input type="text" id="tper-codigo" name="tper-codigo" placeholder="Identificador de categoría"
                            maxlength="10">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="tper-nombre">Nombre <span class="req">*</span></label>
                        <input type="text" id="tper-nombre" name="tper-nombre" placeholder="Categoría (entrada, salida)"
                            maxlength="40">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="tper-descripcion">Descripción <span class="req">*</span></label>
                        <textarea id="tper-descripcion" name="tper-descripcion" rows="2"
                            placeholder="Función del tipo de periférico" maxlength="100"></textarea>
                    </td>
                </tr>
            </table>
        </section>

        <div class="form-actions">
            <form method="get" action="TipodeComponenteInterno.html" id="form-atras">
                <input type="submit" name="ATRÁS" value="ATRÁS" class="btn btn-secondary">
            </form>
            <form method="get" action="Adquisicion.html" id="form-siguiente">
                <input type="submit" name="SIGUIENTE" value="SIGUIENTE" class="btn btn-primary">
            </form>
        </div>

        <br><br><br>
        <center>
            <form method="get" action="../../dashboard/index.html" id="form-salir">
                <input type="submit" name="Salir" value="SALIR" class="btn btn-primary">
            </form>
        </center>

        <script src="../../../assets/js/validacionesformulario.js"></script>
    </main>

</body>

</html>
