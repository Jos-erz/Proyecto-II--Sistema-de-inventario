<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso de Equipos | Fundacite Yaracuy</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <span>Fundacite Yaracuy — Ingreso de Equipos Informáticos</span>
        <img src="Logofundacite.webp" alt="logo" class="logo">
    </header>

    <main>



        <section class="clase-card">
            <div class="clase-titulo">
                <h3>Desincorporación</h3>
            </div>

            <table class="clase-tabla">
                <tr>
                    <td>
                        <label for="n_informe">Número de informe <span class="req">*</span></label>
                        <input type="text" id="n_informe" name="n_informe" placeholder="Correlativo de registro"
                            maxlength="15">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="justificacion">Justificación <span class="req">*</span></label>
                        <input type="text" id="justificacion" name="justificacion"
                            placeholder="Motivo detallado de la desincorporacion" maxlength="255">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="estatus_desincorporacion">Estatus <span class="req">*</span></label>
                        <input type="text" id="estatus_desincorporacion" name="estatus_desincorporacion"
                            placeholder="En Espera,Aprobado,Rechazado" maxlength="15">
                    </td>
                </tr>

            </table>
        </section>

        <form method="post" action="../Mantenimiento/Diagnostico.html">
            <div class="form-actions">

                <input type="submit" name="ATRÁS" value="ATRÁS" class="btn btn-secondary">

        </form>
        <form method="post" action="s.html">

            <input type="submit" name="SIGUIENTE" value="SIGUIENTE" class="btn btn-primary">
            </div>


        </form>


    </main>

</body>

</html>
