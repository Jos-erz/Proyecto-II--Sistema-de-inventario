<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Institución | Fundacite Yaracuy</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <span>Fundacite Yaracuy — Ingreso de Equipos Informáticos</span>
    <img src="Logofundacite.webp" alt="logo" class="logo">
  </header>

  <main>

    <section class="clase-card">
      <div class="clase-titulo">
        <h3>Institución</h3>
      </div>

      <table class="clase-tabla">
        <tr>
          <td>
            <label for="inst-rif">RIF (Registro de Información Fiscal) <span class="req">*</span></label>
            <input type="text" id="inst-rif" name="inst-rif" placeholder="J-00000000-0" maxlength="12" required>
          </td>
        </tr>
        <tr>
          <td>
            <label for="inst-nombre">Nombre <span class="req">*</span></label>
            <input type="text" id="inst-nombre" name="inst-nombre" placeholder="Denominación legal de la institución"
              maxlength="50">
          </td>
        </tr>
        <tr>
          <td>
            <label for="inst-direccion">Dirección <span class="req">*</span></label>
            <textarea id="inst-direccion" name="inst-direccion" rows="2" placeholder="Ubicación física completa"
              maxlength="200"></textarea>
          </td>
        </tr>
      </table>
    </section>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary" onclick="window.history.back()">ATRÁS</button>
      <button type="button" class="btn btn-primary" onclick="guardarInstitucion()">GUARDAR Y FINALIZAR</button>
    </div>

    <br><br><br>
    <center>
        <button type="button" class="btn btn-primary" onclick="window.location.href='../../dashboard/index.html'">SALIR</button>
    </center>

  </main>

  <script>
    function guardarInstitucion() {
        const rif = document.getElementById('inst-rif').value;
        const nombre = document.getElementById('inst-nombre').value;
        const direccion = document.getElementById('inst-direccion').value;

        if (!rif || !nombre) {
            if(window.showStyledAlert) showStyledAlert('Debe completar el RIF y el Nombre.', 'Atención', 'ph-warning', '#dc2626');
            else alert('Debe completar el RIF y el Nombre.');
            return;
        }

        const instituciones = JSON.parse(localStorage.getItem('instituciones') || '[]');
        
        if (!instituciones.some(i => i.rif === rif)) {
            instituciones.push({ rif, nombre, direccion });
            localStorage.setItem('instituciones', JSON.stringify(instituciones));
        }

        if(window.showStyledAlert) {
            showStyledAlert('Institución "' + nombre + '" registrada correctamente.', 'Éxito', 'ph-check-circle', '#10b981');
            setTimeout(() => {
                if(window.goHome) window.goHome();
                else window.location.href = '../../dashboard/index.html';
            }, 1500);
        } else {
            alert('Institución registrada correctamente.');
            window.location.href = '../../dashboard/index.html';
        }
    }
  </script>

  <footer>
    <p>&copy; 2026 Fundacite Yaracuy — Sistema de Inventario</p>
  </footer>

</body>

</html>
